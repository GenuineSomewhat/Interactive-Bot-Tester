name: Auto Build Executable

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'icon.ico'
      - 'build_gui.spec'
      - 'requirements.txt'
      - '.github/workflows/build.yml'

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
    steps:
      - name: Create Release
        uses: actions/create-release@v1
        id: create_release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: build-${{ github.run_number }}
          release_name: Build #${{ github.run_number }}
          body: |
            Automated build from commit ${{ github.sha }}
            
            **Changes**: ${{ github.event.head_commit.message }}
          draft: false
          prerelease: false

  build:
    needs: create-release
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        include:
          - os: ubuntu-latest
            name: Linux
          - os: windows-latest
            name: Windows

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller>=6.19.0

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk

      - name: Build executable
        run: |
          python -m PyInstaller build_gui.spec

      - name: List generated files
        shell: bash
        run: |
          find dist -type f -name "*.exe" -o -name "Interactive*" | head -20

      - name: Upload to Release (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $exePath = Get-ChildItem -Path dist\ -Recurse -Filter "*.exe" | Select-Object -First 1
          if ($exePath) {
            Write-Host "Found executable: $($exePath.FullName)"
            $uploadUrl = "${{ needs.create-release.outputs.upload_url }}" -replace '\{[^}]+\}', ''
            Invoke-RestMethod -Uri "${uploadUrl}?name=Interactive-Bot-Tester-Windows.exe" `
              -Method Post `
              -Headers @{ Authorization = "token ${{ secrets.GITHUB_TOKEN }}"; "Content-Type" = "application/octet-stream" } `
              -InFile $exePath.FullName
          } else {
            Write-Host "No executable found!"
            exit 1
          }

      - name: Compress and upload to Release (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          cd dist
          if [ -d "Interactive Bot Tester" ]; then
            tar -czf "Interactive-Bot-Tester-Linux.tar.gz" "Interactive Bot Tester"
          else
            EXEC=$(find . -maxdepth 2 -type f -executable -name "*Interactive*" | head -1)
            if [ -n "$EXEC" ]; then
              tar -czf "Interactive-Bot-Tester-Linux.tar.gz" "$EXEC"
            fi
          fi
          UPLOAD_URL=$(echo "${{ needs.create-release.outputs.upload_url }}" | sed 's/{[^}]*}//')
          curl -X POST \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Content-Type: application/gzip" \
            --data-binary @"Interactive-Bot-Tester-Linux.tar.gz" \
            "${UPLOAD_URL}?name=Interactive-Bot-Tester-Linux.tar.gz"

