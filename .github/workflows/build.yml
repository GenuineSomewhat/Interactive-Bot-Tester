name: Auto Build Executable

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'icon.ico'
      - 'build_gui.spec'
      - 'requirements.txt'
      - '.github/workflows/build.yml'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.13'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller>=6.19.0
      
      - name: Build executable
        run: |
          python -m PyInstaller build_gui.spec
      
      - name: List generated files
        run: |
          dir dist\
          Get-ChildItem -Recurse dist\ -Name
      
      - name: Create Release
        uses: actions/create-release@v1
        id: create_release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: build-${{ github.run_number }}
          release_name: Build #${{ github.run_number }}
          body: |
            Automated build from commit ${{ github.sha }}
            
            **Changes**: ${{ github.event.head_commit.message }}
          draft: false
          prerelease: false
      
      - name: Find and upload executable
        shell: pwsh
        run: |
          $exePath = Get-ChildItem -Path dist\ -Recurse -Filter "*.exe" | Select-Object -First 1
          if ($exePath) {
            echo "EXE_PATH=$($exePath.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Append
            Write-Host "Found executable: $($exePath.FullName)"
          } else {
            Write-Host "No executable found!"
            exit 1
          }
      
      - name: Upload executable to Release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ${{ env.EXE_PATH }}
          asset_name: Interactive-Bot-Tester.exe
          asset_content_type: application/octet-stream

